<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador - Spotify Pro</title>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/estilos/menu.css">
    <link rel="stylesheet" href="/estilos/buscador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="ultra-dark">

{% include "menu.html" %}

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar-glass">

        <h3 class="nav-title">RESULTADOS</h3>

        {% if resultados %}
        <ul class="songs">
            {% for r in resultados %}
            <li class="song-row">

                <div class="track-meta">
                    <span class="track-name">{{ r.titulo }}</span>
                    <span class="track-sub">YouTube Stream</span>
                </div>

                <div class="song-actions">
                    <button onclick="reproducir('{{ r.url }}', `{{ r.titulo }}`)">
                        <i class="fas fa-play"></i>
                    </button>

                    <button onclick="añadirCancion()">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

            </li>
            {% endfor %}
        </ul>
        {% else %}
            <p>Sin resultados</p>
        {% endif %}
    </aside>

    <!-- PLAYER -->
    <section class="player-center">

        <div class="card-glass-effect">

            <div class="now-playing-pfp">
                <div class="vinyl-record"></div>
                <div class="badge-hi-res">STREAM PRO</div>
            </div>

            <div class="track-header">
                <h1 id="big-title">Selecciona una canción</h1>
                <p class="source-label">Streaming YouTube Engine</p>
            </div>

            <div class="integrated-spectrum">
                <div id="audio-visualizer" class="spectrum-bars"></div>
            </div>

            <div class="progress-engine">
                <span id="time-current">0:00</span>
                <div class="track-slider" id="progress-container">
                    <div class="track-fill" id="progress-bar"></div>
                </div>
                <span id="time-total">0:00</span>
            </div>

            <div class="controls-master">

                <i class="fas fa-backward-step control-btn"></i>

                <div class="play-trigger" id="play-btn">
                    <i class="fas fa-play"></i>
                </div>

                <i class="fas fa-forward-step control-btn"></i>

            </div>

            <div class="volume-ui">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                <i class="fas fa-volume-up"></i>
            </div>

        </div>

    </section>

    <audio id="audio" crossorigin="anonymous"></audio>

</div>

<script src="/script/buscador.js"></script>
<div id="toast-container"></div>
</body>
</html>
