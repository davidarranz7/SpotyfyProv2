<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Pro | Admin Panel</title>
    <link rel="stylesheet" href="/estilos/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="logo">
                <i class="fab fa-spotify"></i> <span>Admin Pro</span>
            </div>
            <nav>
                <a href="/menu" class="nav-item"><i class="fas fa-home"></i> Inicio</a>
                <a href="#" class="nav-item active"><i class="fas fa-users"></i> Usuarios</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Gestión de Usuarios</h1>
                <div class="admin-badge">Admin: {{ admin_name }}</div>
            </header>

            <div class="table-container">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Contraseña</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="user-body">
                        {% for u in usuarios %}
                        <tr id="row-{{ u.id }}">
                            <td>#{{ u.id }}</td>
                            <td>
                                <span class="user-name"
                                      style="cursor:pointer; color:#1db954;"
                                      onclick="verCanciones({{ u.id }}, '{{ u.nombre_usuario }}')">
                                    {{ u.nombre_usuario }}
                                </span>
                            </td>
                            <td>
                                <div class="pass-wrapper">
                                    <input type="password" value="{{ u.contrasena }}" readonly class="pass-input">
                                    <button class="toggle-pass" onclick="togglePassword(this)">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </td>
                            <td>
                                <button class="btn-delete" onclick="eliminarUsuario({{ u.id }}, '{{ u.nombre_usuario }}')">
                                    <i class="fas fa-trash-alt"></i> Borrar
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="/script/admin.js"></script>
</body>
</html>
