<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Spotify Pro | Ultra Edition</title>

    <link rel="stylesheet" href="/estilos/menu.css">
    <link rel="stylesheet" href="/estilos/musica.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="ultra-dark">

{% include "menu.html" %}

<main class="main-grid">

    <!-- SIDEBAR -->
    <aside class="sidebar-glass">
        <div class="sidebar-header">
            <h3 class="nav-title">BIBLIOTECA ELITE</h3>
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="local-search" placeholder="Buscar en la nube...">
            </div>
        </div>

        <div class="queue-list custom-scroll">
            <ul id="songs-list">
                {% for cancion in canciones %}
                <li onclick="playSong({{ loop.index0 }})" class="song-row">
                    <span class="track-num">{{ loop.index }}</span>
                    <div class="track-meta">
                        <span class="track-name">{{ cancion.titulo }}</span>
                        <span class="track-sub">MASTER • 192kHz</span>
                    </div>
                    <i class="fas fa-heart like-btn" data-index="{{ loop.index0 }}"></i>
                </li>
                {% endfor %}
            </ul>
        </div>
    </aside>

    <!-- PLAYER CENTER -->
    <section class="player-center">

        <div class="card-glass-effect">

            <div class="now-playing-pfp">
                <div class="vinyl-record">
                    <div class="vinyl-center"></div>
                </div>
                <div class="badge-hi-res">MASTER Hi-Res</div>
            </div>

            <div class="track-header">
                <h1 id="current-song-title">Selecciona un track</h1>
                <p class="source-label">STREAMING DESDE NUBE PRO</p>
            </div>

            <div class="integrated-spectrum">
                <div id="audio-visualizer" class="spectrum-bars"></div>
            </div>

            <div class="progress-engine">
                <span id="time-current">0:00</span>
                <div class="track-slider" id="progress-container">
                    <div class="track-fill" id="progress-bar"></div>
                </div>
                <span id="time-total">0:00</span>
            </div>

            <!-- NUEVA FILA DE ACCIONES -->
            <div class="track-actions">
                <button id="like-current" class="action-btn">
                    <i class="fas fa-heart"></i> Favorito
                </button>

                <button id="add-playlist" class="action-btn">
                    <i class="fas fa-plus"></i> Añadir a Playlist
                </button>
            </div>

            <div class="controls-master">
                <i class="fas fa-random control-btn" id="shuffle-btn"></i>
                <i class="fas fa-backward-step control-btn" id="prev-btn"></i>

                <div class="play-trigger" id="play-btn">
                    <i class="fas fa-play"></i>
                </div>

                <i class="fas fa-forward-step control-btn" id="next-btn"></i>
                <i class="fas fa-redo control-btn" id="repeat-btn"></i>
            </div>

            <div class="volume-ui">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>

    </section>

    <!-- PANEL DERECHO -->
    <aside class="side-info">
        <div class="info-card">
            <h3>FAVORITAS</h3>
            <ul id="favorites-list"></ul>
        </div>

        <div class="info-card">
            <h3>PLAYLIST LOCAL</h3>
            <ul id="playlist-list"></ul>
        </div>
    </aside>

    <audio id="audio-player" crossorigin="anonymous"></audio>

</main>

<script>const SONGS = {{ canciones | tojson }};</script>
<script src="/script/musica.js"></script>
<script src="/script/menu.js"></script>
</body>
</html>
